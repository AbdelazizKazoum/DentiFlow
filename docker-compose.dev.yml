version: '3.8'

x-db-env: &db-env
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USERNAME: dentiflow
  DB_PASSWORD: dentiflow123
  DB_DATABASE: dentiflow

services:
  mysql:
    image: mysql:8.0
    container_name: dentiflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dentiflow
      MYSQL_USER: dentiflow
      MYSQL_PASSWORD: dentiflow123
    ports:
      - '3305:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysql', '-u', 'root', '-prootpassword', '-e', 'SELECT 1']
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile.dev
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *db-env
      NODE_ENV: development
      PORT: 3000
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command:
      [
        'npx',
        'nest',
        'start',
        'api-gateway',
        '--watch',
        '--watchOptions',
        '{"usePolling": true}',
      ]

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile.dev
    ports:
      - '3002:3002'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *db-env
      NODE_ENV: development
      PORT: 3002
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command:
      [
        'npx',
        'nest',
        'start',
        'auth-service',
        '--watch',
        '--watchOptions',
        '{"usePolling": true}',
      ]

  patient-service:
    build:
      context: .
      dockerfile: apps/patient-service/Dockerfile.dev
    ports:
      - '3003:3003'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *db-env
      NODE_ENV: development
      PORT: 3003
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command:
      [
        'npx',
        'nest',
        'start',
        'patient-service',
        '--watch',
        '--watchOptions',
        '{"usePolling": true}',
      ]

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile.dev
    ports:
      - '3001:3001'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *db-env
      NODE_ENV: development
      PORT: 3001
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command:
      [
        'npx',
        'nest',
        'user-service',
        '--watch',
        '--watchOptions',
        '{"usePolling": true}',
      ]

volumes:
  mysql_data:

x-db-env: &db-env
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USERNAME: dentiflow
  DB_PASSWORD: dentiflow123
  DB_DATABASE: dentiflow

services:
  mysql:
    image: mysql:8.0
    container_name: dentiflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dentiflow
      MYSQL_USER: dentiflow
      MYSQL_PASSWORD: dentiflow123
    ports:
      - '3305:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysql', '-u', 'root', '-prootpassword', '-e', 'SELECT 1']
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *db-env
      NODE_ENV: production
      PORT: 3001

volumes:
  mysql_data:
